name: Discord Bot Webhook

on:
  workflow_dispatch:
    inputs:
      botId:
        description: 'ID of the bot to send manually'
        required: false
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  process-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Processor Script
        run: |
          cat << 'EOF' > process_bot.mjs
          import fs from 'fs';
          import https from 'https';

          const WEBHOOK_URL = process.env.WEBHOOK_URL;
          const BOT_TOKEN = process.env.DISCORD_BOT_TOKEN;
          const MANUAL_ID = process.env.MANUAL_BOT_ID;

          function httpsRequest(options, body = null) {
            return new Promise((resolve) => {
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve({ status: res.statusCode, body: data }));
              });
              req.on('error', (e) => resolve({ status: 0, body: e.message }));
              if (body) req.write(body);
              req.end();
            });
          }

          async function sendToDiscord(title, message) {
            const payload = JSON.stringify({
              content: message,
              thread_name: title,
              username: "Leaf"
            });

            const url = new URL(WEBHOOK_URL + '?wait=true');
            const res = await httpsRequest({
              hostname: url.hostname,
              path: url.pathname + url.search,
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(payload)
              }
            }, payload);

            if (res.status >= 200 && res.status < 300) {
              const parsed = JSON.parse(res.body);
              console.log(`Sent! Message ID: ${parsed.id}, Channel: ${parsed.channel_id}`);

              if (BOT_TOKEN) {
                await new Promise(r => setTimeout(r, 1500));
                const emoji = encodeURIComponent('🔥');
                const reaction = await httpsRequest({
                  hostname: 'discord.com',
                  path: `/api/v10/channels/${parsed.channel_id}/messages/${parsed.id}/reactions/${emoji}/@me`,
                  method: 'PUT',
                  headers: {
                    'Authorization': `Bot ${BOT_TOKEN}`,
                    'Content-Length': '0'
                  }
                });
                if (reaction.status === 204) {
                  console.log('Reaction 🔥 added');
                } else {
                  console.error(`Reaction failed: ${reaction.status} - ${reaction.body}`);
                }
              }

              return { success: true };
            } else {
              console.error(`Discord webhook error: ${res.status} - ${res.body}`);
              return { success: false };
            }
          }

          async function run() {
            if (!fs.existsSync('database.json')) {
              console.error('database.json not found');
              return;
            }

            const db = JSON.parse(fs.readFileSync('database.json', 'utf8'));
            const now = new Date();
            let dirty = false;

            if (MANUAL_ID && db.bots && db.bots[MANUAL_ID]) {
              const bot = db.bots[MANUAL_ID];
              if (!bot.sent) {
                console.log(`Manual trigger for: ${bot.title}`);
                const result = await sendToDiscord(bot.title, bot.message);
                if (result.success) {
                  bot.sent = true;
                  bot.status = 'sent';
                  bot.sentTime = now.toISOString();
                  bot.scheduled = false;
                  dirty = true;
                }
              }
            }

            if (db.bots) {
              for (const [id, bot] of Object.entries(db.bots)) {
                if (bot.sent || bot.cancelled || bot.isProcessing) continue;

                if (bot.scheduled && bot.scheduledTime) {
                  const scheduleDate = new Date(bot.scheduledTime);
                  if (scheduleDate <= now) {
                    console.log(`Processing scheduled: ${bot.title}`);
                    const result = await sendToDiscord(bot.title, bot.message);
                    if (result.success) {
                      bot.sent = true;
                      bot.status = 'sent';
                      bot.sentTime = now.toISOString();
                      bot.scheduled = false;
                      dirty = true;
                    }
                    await new Promise(r => setTimeout(r, 1000));
                  }
                }
              }
            }

            if (dirty) {
              fs.writeFileSync('database.json', JSON.stringify(db, null, 2));
              console.log('Changes saved to database.json');
            }
          }

          run();
          EOF

      - name: Run Processor
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          MANUAL_BOT_ID: ${{ github.event.inputs.botId }}
        run: node process_bot.mjs

      - name: Commit Database Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add database.json
          if git diff --staged --quiet; then
            echo "No changes to database.json"
          else
            git commit -m "Bot: Status Update [skip ci]"
            git pull origin main --rebase
            git push origin main
          fi
